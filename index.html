<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Estufa - Tomate-Cereja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Simulador de Estufa - Tomate-Cereja</h1>
        <p>Equilíbrio entre produção e meio ambiente</p>
    </header>

    <main>
        <section id="simulador">
            <h2>Configurações da Estufa</h2>
            <label>Temperatura (°C):
                <input type="number" id="temperatura" value="25" min="15" max="35">
            </label>
            <label>Luz (horas/dia):
                <input type="number" id="luz" value="12" min="6" max="18">
            </label>
            <label>Irrigação (L/dia):
                <input type="number" id="irrigacao" value="1" min="0.1" max="5" step="0.1">
            </label>
            <label>Fertilizante:
                <select id="fertilizante">
                    <option value="organico">Orgânico</option>
                    <option value="quimico">Químico</option>
                </select>
            </label>
            <button onclick="simular()">Simular Crescimento</button>
        </section>

        <section id="resultados">
            <h2>Resultados da Simulação</h2>
            <p id="crescimento">Crescimento: -</p>
            <p id="impacto">Impacto ambiental: -</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
